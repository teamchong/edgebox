name: TSC Benchmark

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'benchmark/**'
      - '.github/actions/**'
      - '.github/workflows/tsc-benchmark.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'benchmark/**'
      - '.github/actions/**'
      - '.github/workflows/tsc-benchmark.yml'
  workflow_dispatch:
    inputs:
      full_suite:
        description: 'Run full benchmark suite (including VSCode)'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: tsc-benchmark-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tsc-benchmark:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup EdgeBox
        uses: ./.github/actions/setup-edgebox
        with:
          node-version: '24'

      - name: Install benchmark dependencies
        run: |
          cd benchmark
          npm install

      - name: Compile tsc with EdgeBox (worker path)
        run: |
          ./zig-out/bin/edgebox benchmark/node_modules/typescript/lib/_tsc.js

      - name: Install tsgo (TypeScript Native Preview)
        continue-on-error: true
        run: |
          # Install Microsoft's tsgo (Go-based TypeScript compiler)
          npm install -g @typescript/native-preview || echo "tsgo not available"
          which tsgo || echo "tsgo not in PATH"

      - name: Run TSC Benchmark (Quick)
        if: ${{ github.event.inputs.full_suite != 'true' }}
        run: |
          cd benchmark
          npx tsx run.ts --no-vscode --runs 3 --include-bun --include-tsgo

      - name: Run TSC Benchmark (Full)
        if: ${{ github.event.inputs.full_suite == 'true' }}
        run: |
          cd benchmark
          npx tsx run.ts --runs 3 --include-bun --include-tsgo

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: tsc-benchmark-results
          path: benchmark/results.json
          if-no-files-found: ignore

      - name: Generate Summary
        run: |
          echo "# TSC Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Using Microsoft's tsgo benchmark projects (rxjs, trpc, date-fns, typeorm, playwright)." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f benchmark/results.json ]; then
            # Parse JSON and generate table with optional Bun/tsgo columns
            node -e "
              const results = require('./benchmark/results.json');
              const hasBun = results.some(r => r.bunMean !== undefined);
              const hasTsgo = results.some(r => r.tsgoMean !== undefined);

              let hdr = '| Project | Lines | Node.js (ms) |';
              let sep = '|---------|-------|--------------|';
              if (hasBun) { hdr += ' Bun (ms) |'; sep += '----------|'; }
              hdr += ' EdgeBox (ms) | vs Node |';
              sep += '--------------|---------|';
              if (hasBun) { hdr += ' vs Bun |'; sep += '--------|'; }
              if (hasTsgo) { hdr += ' tsgo (ms) | tsgo Speedup |'; sep += '-----------|--------------|'; }
              hdr += ' Match |';
              sep += '-------|';
              console.log(hdr);
              console.log(sep);

              let totalLines = 0, totalSpeedup = 0, allMatch = true;
              let totalBunSpeedup = 0, bunCount = 0;
              let totalTsgoSpeedup = 0, tsgoCount = 0;

              for (const r of results) {
                let row = '| ' + r.project + ' | ' + r.lines.toLocaleString() + ' | ' + r.nodeMean.toFixed(0) + ' |';
                if (hasBun) row += ' ' + (r.bunMean !== undefined ? r.bunMean.toFixed(0) : '-') + ' |';
                row += ' ' + r.edgeboxMean.toFixed(0) + ' | ' + r.speedup.toFixed(2) + 'x |';
                if (hasBun) {
                  row += ' ' + (r.bunSpeedup !== undefined ? r.bunSpeedup.toFixed(2) + 'x' : '-') + ' |';
                  if (r.bunSpeedup !== undefined) { totalBunSpeedup += r.bunSpeedup; bunCount++; }
                }
                if (hasTsgo) {
                  row += ' ' + (r.tsgoMean !== undefined ? r.tsgoMean.toFixed(0) : '-') + ' | ' + (r.tsgoSpeedup !== undefined ? r.tsgoSpeedup.toFixed(2) + 'x' : '-') + ' |';
                  if (r.tsgoSpeedup !== undefined) { totalTsgoSpeedup += r.tsgoSpeedup; tsgoCount++; }
                }
                row += ' ' + (r.outputMatch ? '✓' : '✗') + ' |';
                console.log(row);
                totalLines += r.lines;
                totalSpeedup += r.speedup;
                if (!r.outputMatch) allMatch = false;
              }

              console.log(sep);
              const avgSpeedup = (totalSpeedup / results.length).toFixed(2);
              let summary = '| **TOTAL** | ' + totalLines.toLocaleString() + ' | |';
              if (hasBun) summary += ' |';
              summary += ' | ' + avgSpeedup + 'x avg |';
              if (hasBun) summary += ' ' + (bunCount > 0 ? (totalBunSpeedup/bunCount).toFixed(2) + 'x avg' : '-') + ' |';
              if (hasTsgo) summary += ' | ' + (tsgoCount > 0 ? (totalTsgoSpeedup/tsgoCount).toFixed(2) + 'x avg' : '-') + ' |';
              summary += ' ' + (allMatch ? '✓' : '✗') + ' |';
              console.log(summary);
            " >> $GITHUB_STEP_SUMMARY

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✓ = Diagnostic counts match Node.js tsc" >> $GITHUB_STEP_SUMMARY
          else
            echo "_Results not available_" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check Diagnostic Counts
        run: |
          if [ -f benchmark/results.json ]; then
            node -e "
              const results = require('./benchmark/results.json');
              const mismatches = results.filter(r => !r.outputMatch);
              if (mismatches.length > 0) {
                console.log('Diagnostic count mismatches:');
                for (const r of mismatches) {
                  console.log('  ' + r.project + ': Node=' + r.nodeDiagnostics + ' EdgeBox=' + r.edgeboxDiagnostics);
                }
                process.exit(1);
              } else {
                console.log('All diagnostics match Node.js tsc');
              }
            "
          fi

      - name: Post PR Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## TSC Benchmark Results\n\n';
            body += 'Using Microsoft\'s tsgo benchmark projects.\n\n';

            try {
              const results = JSON.parse(fs.readFileSync('benchmark/results.json', 'utf8'));
              const hasBun = results.some(r => r.bunMean !== undefined);
              const hasTsgo = results.some(r => r.tsgoMean !== undefined);

              let hdr = '| Project | Lines | Node.js |';
              let sep = '|---------|-------|---------|';
              if (hasBun) { hdr += ' Bun |'; sep += '-----|'; }
              hdr += ' EdgeBox | vs Node |';
              sep += '---------|---------|';
              if (hasBun) { hdr += ' vs Bun |'; sep += '--------|'; }
              if (hasTsgo) { hdr += ' tsgo | tsgo Speedup |'; sep += '------|--------------|'; }
              hdr += ' Match |\n';
              sep += '-------|\n';
              body += hdr + sep;

              let totalSpeedup = 0, allMatch = true;
              let totalBunSpeedup = 0, bunCount = 0;
              let totalTsgoSpeedup = 0, tsgoCount = 0;

              for (const r of results) {
                const match = r.outputMatch ? ':white_check_mark:' : ':x:';
                let row = `| ${r.project} | ${r.lines.toLocaleString()} | ${r.nodeMean.toFixed(0)}ms |`;
                if (hasBun) {
                  row += ` ${r.bunMean !== undefined ? r.bunMean.toFixed(0) + 'ms' : '-'} |`;
                  if (r.bunSpeedup !== undefined) { totalBunSpeedup += r.bunSpeedup; bunCount++; }
                }
                row += ` ${r.edgeboxMean.toFixed(0)}ms | ${r.speedup.toFixed(2)}x |`;
                if (hasBun) row += ` ${r.bunSpeedup !== undefined ? r.bunSpeedup.toFixed(2) + 'x' : '-'} |`;
                if (hasTsgo) {
                  row += ` ${r.tsgoMean !== undefined ? r.tsgoMean.toFixed(0) + 'ms' : '-'} | ${r.tsgoSpeedup !== undefined ? r.tsgoSpeedup.toFixed(2) + 'x' : '-'} |`;
                  if (r.tsgoSpeedup !== undefined) { totalTsgoSpeedup += r.tsgoSpeedup; tsgoCount++; }
                }
                row += ` ${match} |\n`;
                body += row;
                totalSpeedup += r.speedup;
                if (!r.outputMatch) allMatch = false;
              }

              const avgSpeedup = (totalSpeedup / results.length).toFixed(2);
              let summary = `**EdgeBox vs Node: ${avgSpeedup}x**`;
              if (bunCount > 0) summary += ` | **vs Bun: ${(totalBunSpeedup/bunCount).toFixed(2)}x**`;
              if (tsgoCount > 0) summary += ` | **tsgo: ${(totalTsgoSpeedup/tsgoCount).toFixed(2)}x**`;
              summary += allMatch ? ' :white_check_mark: All outputs match' : ' :x: Some outputs differ';
              body += `\n${summary}\n`;

            } catch (e) {
              body += '_Results not available_\n';
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
