name: 'Setup EdgeBox'
description: 'Setup EdgeBox build environment with all dependencies'

inputs:
  node-version:
    description: 'Node.js version to install'
    required: false
    default: '20'
  install-hyperfine:
    description: 'Install hyperfine for benchmarking'
    required: false
    default: 'false'
  install-porffor:
    description: 'Install Porffor JS-to-WASM compiler'
    required: false
    default: 'false'
  build-test262:
    required: false
    default: 'false'
  build-benchmarks:
    description: 'Build all benchmark WASM files'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    # === Tool Setup (always needed) ===
    - name: Setup Zig
      uses: goto-bus-stop/setup-zig@v2
      with:
        version: 0.15.2

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install Porffor
      if: inputs.install-porffor == 'true'
      shell: bash
      run: npm install -g porffor

    - name: Install hyperfine and wasmtime
      if: inputs.install-hyperfine == 'true'
      shell: bash
      run: |
        if [[ "$OSTYPE" == "darwin"* ]]; then
          # Install hyperfine, coreutils (for gtimeout), and wasmtime
          brew install hyperfine coreutils wasmtime
        else
          # hyperfine
          wget -q https://github.com/sharkdp/hyperfine/releases/download/v1.20.0/hyperfine-musl_1.20.0_amd64.deb
          sudo dpkg -i hyperfine-musl_1.20.0_amd64.deb
          # wasmtime
          curl https://wasmtime.dev/install.sh -sSf | bash
          echo "$HOME/.wasmtime/bin" >> $GITHUB_PATH
        fi

    - name: Install build dependencies
      shell: bash
      run: |
        if [[ "$OSTYPE" == "darwin"* ]]; then
          # macOS - LLVM 20 for LTO (aligns with Zig's internal LLVM)
          brew install llvm@20 cmake ninja
          # Verify LLVM tools are available
          /opt/homebrew/opt/llvm@20/bin/opt --version || { echo "ERROR: LLVM 20 opt not found"; exit 1; }
        else
          # Linux - LLVM 20 for LTO
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          sudo add-apt-repository -y "deb http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-20 main"
          sudo apt-get update
          sudo apt-get install -y llvm-20 llvm-20-dev clang-20 lld-20 libc++-20-dev libc++abi-20-dev cmake ninja-build

          # Find and symlink libLLVM.so for Zig
          echo "Searching for libLLVM..."
          find /usr/lib -name "libLLVM*" 2>/dev/null || true

          # Try common locations
          if [ -f /usr/lib/llvm-20/lib/libLLVM.so ]; then
            sudo ln -sf /usr/lib/llvm-20/lib/libLLVM.so /usr/lib/x86_64-linux-gnu/libLLVM.so
          elif [ -f /usr/lib/llvm-20/lib/libLLVM-20.so ]; then
            sudo ln -sf /usr/lib/llvm-20/lib/libLLVM-20.so /usr/lib/x86_64-linux-gnu/libLLVM.so
          elif [ -f /usr/lib/llvm-20/lib/libLLVM-20.so.1 ]; then
            sudo ln -sf /usr/lib/llvm-20/lib/libLLVM-20.so.1 /usr/lib/x86_64-linux-gnu/libLLVM.so
          else
            echo "ERROR: libLLVM not found in /usr/lib/llvm-20/lib/"
            exit 1
          fi

          echo "Created symlink:"
          ls -la /usr/lib/x86_64-linux-gnu/libLLVM.so

          # Verify LLVM tools are available
          /usr/lib/llvm-20/bin/opt --version || { echo "ERROR: LLVM 20 opt not found"; exit 1; }
        fi

    - name: Cache EdgeBox build
      id: cache-edgebox
      uses: actions/cache@v4
      with:
        path: |
          zig-out/
          vendor/binaryen/
        key: edgebox-v12-${{ runner.os }}-${{ hashFiles('build.zig', 'src/**/*.zig', 'src/freeze/*.zig', 'src/*.js', 'src/tsc-recipe/*.js', 'src/polyfills/*.js') }}

    # === Build Binaryen (if cache miss) ===
    - name: Build Binaryen
      if: steps.cache-edgebox.outputs.cache-hit != 'true'
      shell: bash
      run: |
        # Clone binaryen if not exists (not a submodule)
        if [ ! -d vendor/binaryen ]; then
          git clone --depth 1 --branch version_119 https://github.com/WebAssembly/binaryen.git vendor/binaryen
        fi
        cd vendor/binaryen
        cmake -G Ninja -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=OFF .
        ninja -C build
        # Install system-wide for Zig to find
        sudo ninja -C build install
        # Update linker cache (Linux only)
        if [[ "$OSTYPE" != "darwin"* ]]; then
          sudo ldconfig
        fi

    # === Install TypeScript (needed  TSC benchmark) ===
    - name: Install TypeScript
      if: steps.cache-edgebox.outputs.cache-hit != 'true'
      shell: bash
      run: |
        npm install typescript@5.9.3 --no-save 2>/dev/null || npm install typescript --no-save
        ls node_modules/typescript/lib/typescript.js && echo "TypeScript installed"

    # === Build Zig IO library  ===
    - name: Build Zig IO
      if: steps.cache-edgebox.outputs.cache-hit != 'true'
      shell: bash
      run: |
        mkdir -p zig-out/lib
        zig build-lib src/edgebox_io.zig -target x86_64-linux-gnu -OReleaseFast --name edgebox_io -fPIC -femit-bin=zig-out/lib/libedgebox_io.a
        echo "Built libedgebox_io.a ($(du -h zig-out/lib/libedgebox_io.a | cut -f1))"

    # === Install binaryen system-wide (on cache hit, since build step is skipped) ===
    - name: Install Binaryen (cache hit)
      if: steps.cache-edgebox.outputs.cache-hit == 'true'
      shell: bash
      run: |
        cd vendor/binaryen
        sudo ninja -C build install
        # Update linker cache (Linux only)
        if [[ "$OSTYPE" != "darwin"* ]]; then
          sudo ldconfig
        fi

    - name: Build test262
      if: inputs.build-test262 == 'true'
      shell: bash
      run: zig build test262 -Doptimize=ReleaseFast -Dcpu=baseline

    # === Setup environment (always needed, even on cache hit) ===
    - name: Setup paths
      shell: bash
      run: |
        # Add edgebox CLI to PATH
        echo "${{ github.workspace }}/zig-out/bin" >> $GITHUB_PATH
